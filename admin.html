<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>

  <link rel="stylesheet" href="admin.css">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="supabase.js"></script>
</head>
<body>

<div class="login" id="login-screen">
  <h1>✨ MODIFICACIONES ✨</h1>

  <input type="text" id="user" placeholder="Usuario">
  <input type="password" id="pass" placeholder="Clave">

  <button onclick="login()">Ingresar</button>
</div>

<div id="dashboard" class="hidden">

  <aside>
    <button onclick="showAdmin('productos')">📚 Productos</button>
    <button onclick="showAdmin('sobremi')">👩‍🏫 Sobre mí</button>
  </aside>

  <main>

    <section id="admin-productos" class="admin-section">
      <h2>Productos</h2>

      <input id="nombre" placeholder="Nombre">
      <input id="precio" placeholder="Precio">
      <input id="descripcion" placeholder="Descripción">

      <input type="file" id="imagen">
      <input type="file" id="pdf">

      <button onclick="guardarProducto()">Guardar producto</button>

      <div id="lista-productos"></div>
    </section>

    <section id="admin-sobremi" class="admin-section hidden">
      <h2>Sobre mí</h2>

      <textarea id="texto-sobremi"></textarea>

      <input type="file" id="galeria-input" multiple>

      <button onclick="guardarSobreMi()">Guardar cambios</button>
    </section>

  </main>
</div>

<script src="admin.js"></script>
</body>
</html>
