<!DOCTYPE html><html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MANITOS</title><!-- Firebase --><script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script><script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script><style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background: url('https://i.imgur.com/PgPo6iZ.jpeg') no-repeat center center fixed;
  background-size: cover;
  color:#fff;
}

/* CAPA OSCURA PARA LEGIBILIDAD */
body::before{
  content:"";
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.4);
  z-index:-1;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero img{
  display:none;
}

.hero h2{
  font-size:28px;
  margin:10px 0;
}

.hero p{
  font-size:18px;
}

.hero button{
  margin-top:20px;
  padding:15px 30px;
  border:none;
  border-radius:30px;
  background: linear-gradient(90deg,#6fb1fc,#4364f7);
  color:white;
  font-size:16px;
  cursor:pointer;
}

/* MENU */
.menu{
  display:none;
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:20px;
  text-align:center;
}

.menu button{
  width:90%;
  max-width:400px;
  display:block;
  margin:15px auto;
  padding:18px;
  border:none;
  border-radius:20px;
  background: rgba(255,255,255,0.2);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  box-shadow:0 8px 25px rgba(0,0,0,0.2);
  font-size:18px;
  text-align:left;
  cursor:pointer;
  color:#fff;
  transition: all 0.3s ease;
}

.menu button:hover{
  transform: scale(1.05);
  background: rgba(255,255,255,0.3);
}

.menu button span{
  float:right;
}

.section{
  display:none;
  padding:20px;
  max-width:900px;
  margin:auto;
  color:#fff;
}

.card{
  background:rgba(255,255,255,0.9);
  padding:20px;
  border-radius:15px;
  margin:10px 0;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
  color:#333;
}

/* ADMIN LOGIN SECRETO */
.admin-login{
  display:none;
  height:100vh;
  justify-content:center;
  align-items:center;
}

.admin-box{
  background:#fff;
  padding:30px;
  border-radius:20px;
  box-shadow:0 5px 20px rgba(0,0,0,0.1);
  width:300px;
}

.admin-box input{
  width:100%;
  padding:10px;
  margin:10px 0;
  border-radius:10px;
  border:1px solid #ccc;
}

.admin-box button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  background:#4364f7;
  color:white;
  cursor:pointer;
}

.admin-panel{
  display:none;
  padding:20px;
}
</style></head><body><!-- HERO --><div class="hero" id="hero">
  <img src="https://i.imgur.com/PgPo6iZ.jpeg">
  <h2>Consultorio Psicopedagógico</h2>
  <p>Lic. Daiana Carberol</p>
  <button onclick="mostrarMenu()">INGRESAR</button>
</div><!-- MENU --><div class="menu" id="menu">
  <button onclick="mostrar('tienda')">🛍️ Productos <span>›</span></button>
  <button onclick="mostrar('turnos')">🧠 Sesiones Psicopedagogía <span>›</span></button>
  <button onclick="mostrar('info')">👩‍⚕️ Acerca de nosotros <span>›</span></button>
</div><!-- SECCIONES --><div class="section" id="tienda"><h2>Productos</h2><div id="productos"></div></div>
<div class="section" id="turnos"><h2>Sesiones Psicopedagogía</h2><p>Solicitar sesiones por WhatsApp: 1134236917</p></div>
<div class="section" id="info"><h2>Acerca de nosotros</h2><p>Pilar Point, Consultorio 6</p><p>Instagram: @manitos.pilar</p></div><!-- ADMIN LOGIN --><div class="admin-login" id="adminLogin">
  <div class="admin-box">
    <h3>Panel Admin</h3>
    <input id="user" placeholder="Usuario">
    <input id="pass" type="password" placeholder="Contraseña">
    <button onclick="login()">Entrar</button>
  </div>
</div><!-- ADMIN PANEL --><div class="admin-panel" id="adminPanel">
  <h2>Backoffice</h2>
  <input id="nombre" placeholder="Producto">
  <input id="precio" placeholder="Precio">
  <input id="link" placeholder="Link PDF">
  <button onclick="agregarProducto()">Guardar</button>
</div><script>
const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "TU_DOMINIO",
  projectId: "TU_PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function mostrarMenu(){
  document.getElementById('hero').style.display='none';
  document.getElementById('menu').style.display='block';
}

function mostrar(id){
  document.querySelectorAll('.section').forEach(s=>s.style.display='none');
  document.getElementById(id).style.display='block';
}

// DETECCIÓN DE MODO ADMIN (ANTES DE MOSTRAR HERO)
window.addEventListener('DOMContentLoaded',()=>{
  if(window.location.hash === "#admin"){
    document.getElementById('hero').style.display='none';
    document.getElementById('menu').style.display='none';
    document.querySelectorAll('.section').forEach(s=>s.style.display='none');
    document.getElementById('adminLogin').style.display='flex';
  }
});

function login(){
  let u=document.getElementById('user').value;
  let p=document.getElementById('pass').value;
  if(u==="admin" && p==="1234"){
    document.getElementById('adminLogin').style.display='none';
    document.getElementById('adminPanel').style.display='block';
  }else{
    alert("Datos incorrectos");
  }
}

function cargarProductos(){
  db.collection("productos").get().then(snapshot=>{
    let cont=document.getElementById("productos");
    cont.innerHTML="";
    snapshot.forEach(doc=>{
      let p=doc.data();
      cont.innerHTML+=`<div class='card'>
        <h3>${p.nombre}</h3>
        <p>$${p.precio}</p>
        <button onclick="eliminarProducto('${doc.id}')" style="margin-top:10px;padding:8px 12px;border:none;border-radius:10px;background:#ff4d4d;color:white;cursor:pointer;">Eliminar</button>
      </div>`;
    });
  });
}

function eliminarProducto(id){
  if(confirm("¿Eliminar este producto?")){
    db.collection("productos").doc(id).delete().then(()=>{
      alert("Producto eliminado");
      cargarProductos();
    });
  }
}</h3><p>$${p.precio}</p></div>`;
    });
  });
}

function agregarProducto(){
  let n=document.getElementById("nombre").value;
  let p=parseInt(document.getElementById("precio").value);
  let l=document.getElementById("link").value;
  db.collection("productos").add({nombre:n,precio:p,link:l});
  alert("Guardado");
  cargarProductos();
}

cargarProductos();
</script></body>
</html>
