<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consultorio Psicopedagógico | Lic. Daiana Carberol</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
overflow-x:hidden;
background:#f5f5f5;
}

/* LOADER */

.loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100vh;
background:#111;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
transition:opacity 1s ease;
}

.loader.fade{
opacity:0;
pointer-events:none;
}

.loader h1{
color:white;
font-size:2rem;
font-weight:600;
}

/* HERO */

.hero{
width:100%;
height:100vh;
background:
linear-gradient(rgba(0,0,0,0.45),rgba(0,0,0,0.45)),
url('https://i.imgur.com/PgPo6iZ.jpeg');
background-size:cover;
background-position:center;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

.hero-content{
color:white;
max-width:800px;
animation:fadeUp 1s ease;
}

.hero h1{
font-size:4rem;
margin-bottom:20px;
}

.hero p{
font-size:1.4rem;
font-weight:300;
}

/* MENU BUTTON */

.menu-button{
position:fixed;
top:20px;
left:20px;
width:60px;
height:60px;
border-radius:50%;
background:rgba(255,255,255,0.2);
backdrop-filter:blur(10px);
display:flex;
justify-content:center;
align-items:center;
font-size:1.6rem;
color:white;
cursor:pointer;
z-index:1000;
}

/* SIDEBAR */

.sidebar{
position:fixed;
top:0;
left:-300px;
width:280px;
height:100vh;
background:#111;
padding:120px 25px;
transition:0.4s ease;
z-index:999;
}

.sidebar.active{
left:0;
}

.sidebar button{
width:100%;
padding:18px;
margin-bottom:15px;
background:#222;
color:white;
border:none;
border-radius:16px;
font-size:1rem;
text-align:left;
cursor:pointer;
transition:0.3s;
}

.sidebar button:hover{
background:#333;
padding-left:25px;
}

/* SECTIONS */

.section{
display:none;
min-height:100vh;
padding:120px 8%;
background:#f8f8f8;
}

.section.active{
display:block;
}

.section-title{
text-align:center;
font-size:2.5rem;
margin-bottom:60px;
color:#222;
}

/* PRODUCTS */

.products-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:30px;
}

.product-card{
background:white;
padding:30px;
border-radius:30px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
transition:0.3s ease;
}

.product-card:hover{
transform:translateY(-8px);
}

.product-card h3{
margin-bottom:15px;
font-size:1.3rem;
color:#222;
}

.product-card p{
margin-bottom:20px;
color:#666;
line-height:1.6;
}

.price{
font-size:1.5rem;
font-weight:700;
color:#5b4bff;
margin-bottom:20px;
}

.card-btn{
display:inline-block;
padding:14px 22px;
background:#5b4bff;
color:white;
text-decoration:none;
border-radius:14px;
}

/* ABOUT */

.about-card,
.turnos-card{
max-width:850px;
margin:auto;
background:white;
padding:50px;
border-radius:30px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
text-align:center;
}

.about-card h3,
.turnos-card h3{
font-size:2rem;
margin-bottom:20px;
color:#222;
}

.about-card p,
.turnos-card p{
color:#555;
line-height:1.8;
margin-bottom:15px;
}

.contact-btn{
display:inline-block;
margin-top:20px;
padding:16px 28px;
background:#25D366;
color:white;
text-decoration:none;
border-radius:18px;
font-weight:600;
}

/* WHATSAPP */

.whatsapp{
position:fixed;
bottom:25px;
right:25px;
width:70px;
height:70px;
border-radius:50%;
background:#25D366;
display:flex;
justify-content:center;
align-items:center;
box-shadow:0 8px 25px rgba(0,0,0,0.2);
z-index:1000;
}

/* ANIMATION */

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(30px);
}

to{
opacity:1;
transform:translateY(0);
}
}

/* MOBILE */

@media(max-width:768px){

.hero h1{
font-size:2.5rem;
}

.hero p{
font-size:1.1rem;
}

.section{
padding:100px 20px;
<section class="hero" id="hero">
Espacio dedicado al acompañamiento psicopedagógico infantil y adolescente, brindando herramientas personalizadas para potenciar el aprendizaje y el desarrollo emocional.
<img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" width="34" alt="WhatsApp">
</a>

<script>

window.addEventListener('load', function(){

setTimeout(function(){

const loader = document.getElementById('loader');
loader.classList.add('fade');

}, 1500);

});

function toggleMenu(){

const sidebar = document.getElementById('sidebar');
sidebar.classList.toggle('active');

}

function showSection(id){

const hero = document.getElementById('hero');
hero.style.display = 'none';

const sections = document.querySelectorAll('.section');

sections.forEach(function(section){
section.classList.remove('active');
});

const target = document.getElementById(id);
target.classList.add('active');

window.scrollTo({
top:0,
behavior:'smooth'
});

const sidebar = document.getElementById('sidebar');
sidebar.classList.remove('active');

}

</script>

</body>
</html>
