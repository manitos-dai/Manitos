<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MANITOS</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<style>
body{margin:0;font-family:'Segoe UI',sans-serif;background:#f7fbff;color:#333;}

/* HEADER */
.header{
  position:fixed;top:0;width:100%;
  background:rgba(255,255,255,0.9);
  backdrop-filter: blur(10px);
  display:flex;justify-content:space-between;align-items:center;
  padding:12px 20px;z-index:1000;
}

.logo{font-weight:bold;font-size:20px;color:#7aa7ff;}
.menu-btn{font-size:26px;cursor:pointer;}

/* MENU HAMBURGUESA */
.menu{
  position:fixed;top:60px;right:-260px;width:260px;height:100%;
  background:#ffffff;border-radius:20px 0 0 20px;
  box-shadow:-5px 0 20px rgba(0,0,0,0.1);
  padding:20px;transition:0.3s;
}
.menu.active{right:0;}
.menu button{
  width:100%;margin:10px 0;padding:15px;
  border:none;border-radius:12px;
  background:#f0f4ff;font-size:16px;text-align:left;cursor:pointer;
}
.menu button:hover{background:#e4ecff;}

/* HERO */
.hero{
  height:100vh;
  background: linear-gradient(180deg,#ffffff,#f7fbff);
  display:flex;flex-direction:column;justify-content:center;align-items:center;
  text-align:center;padding-top:60px;
}
.hero img{
  width:80%;max-width:420px;
  mix-blend-mode:multiply;
}
.hero h2{font-size:28px;margin:15px 0;}
.hero p{font-size:18px;color:#666;}
.hero button{
  margin-top:20px;padding:14px 30px;border:none;border-radius:30px;
  background:linear-gradient(90deg,#a8edea,#fed6e3);
  cursor:pointer;font-size:16px;
}

.section{display:none;padding:80px 20px 20px;max-width:900px;margin:auto;}
.card{
  background:#fff;padding:20px;border-radius:15px;margin:10px 0;
  box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

/* ADMIN */
.admin-login{display:none;height:100vh;justify-content:center;align-items:center;}
.admin-box{background:#fff;padding:30px;border-radius:20px;box-shadow:0 5px 20px rgba(0,0,0,0.1);width:300px;}
.admin-box input{width:100%;padding:10px;margin:10px 0;border-radius:10px;border:1px solid #ccc;}
.admin-box button{width:100%;padding:12px;border:none;border-radius:12px;background:#a8edea;cursor:pointer;}
.admin-panel{display:none;padding:20px;}
</style>
</head>
<body>

<div class="header">
  <div class="logo">MANITOS</div>
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
</div>

<div class="menu" id="menu">
  <button onclick="ir('tienda')">📚 Productos</button>
  <button onclick="ir('turnos')">📅 Turnos</button>
  <button onclick="ir('info')">ℹ️ Información</button>
  <button onclick="ir('contacto')">📷 Instagram</button>
</div>

<!-- HERO -->
<div class="hero" id="home">
  <img src="https://i.imgur.com/NTAFsSB.jpeg">
  <h2>Consultorio Psicopedagógico</h2>
  <p>Lic. Daiana Carberol</p>
  <button onclick="ir('tienda')">Ver materiales</button>
</div>

<!-- SECCIONES -->
<div class="section" id="tienda"><h2>Productos</h2><div id="productos"></div></div>
<div class="section" id="turnos"><h2>Turnos</h2><div class="card">WhatsApp: 1134236917</div></div>
<div class="section" id="info"><h2>Información</h2><div class="card">Pilar Point, Consultorio 6</div></div>
<div class="section" id="contacto"><h2>Instagram</h2><div class="card">@manitos.pilar</div></div>

<!-- ADMIN -->
<div class="admin-login" id="adminLogin">
  <div class="admin-box">
    <h3>Panel Admin</h3>
    <input id="user" placeholder="Usuario">
    <input id="pass" type="password" placeholder="Contraseña">
    <button onclick="login()">Entrar</button>
  </div>
</div>

<div class="admin-panel" id="adminPanel">
<h2>Backoffice</h2>
<input id="nombre" placeholder="Producto">
<input id="precio" placeholder="Precio">
<input id="link" placeholder="Link PDF">
<button onclick="agregarProducto()">Guardar</button>
</div>

<script>

const firebaseConfig = {
apiKey: "TU_API_KEY",
authDomain: "TU_DOMINIO",
projectId: "TU_PROJECT_ID"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function toggleMenu(){
  document.getElementById('menu').classList.toggle('active');
}

function ir(id){
  document.getElementById('home').style.display='none';
  document.querySelectorAll('.section').forEach(s=>s.style.display='none');
  document.getElementById(id).style.display='block';
  document.getElementById('menu').classList.remove('active');
}

// ADMIN FIX
if(window.location.hash === "#admin"){
  document.getElementById('home').style.display='none';
  document.getElementById('menu').style.display='none';
  document.getElementById('adminLogin').style.display='flex';
}

function login(){
  let u=document.getElementById('user').value;
  let p=document.getElementById('pass').value;
  if(u==="admin" && p==="1234"){
    document.getElementById('adminLogin').style.display='none';
    document.getElementById('adminPanel').style.display='block';
  }else{alert("Datos incorrectos");}
}

function cargarProductos(){
  db.collection("productos").get().then(snapshot=>{
    let cont=document.getElementById("productos");
    cont.innerHTML="";
    snapshot.forEach(doc=>{
      let p=doc.data();
      cont.innerHTML+=`<div class='card'><h3>${p.nombre}</h3><p>$${p.precio}</p></div>`;
    });
  });
}

function agregarProducto(){
  let n=document.getElementById("nombre").value;
  let p=parseInt(document.getElementById("precio").value);
  let l=document.getElementById("link").value;
  db.collection("productos").add({nombre:n,precio:p,link:l});
  alert("Guardado");
  cargarProductos();
}

cargarProductos();

</script>

</body>
</html>
